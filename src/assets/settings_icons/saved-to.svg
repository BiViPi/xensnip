<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" class="icon-svg">
            <defs>
                <!-- Dải màu gradient chung bao phủ toàn bộ không gian của icon -->
                <linearGradient id="neonGradient" x1="0" y1="40" x2="0" y2="216" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#38BDF8" /> <!-- Xanh Cyan rực rỡ -->
                    <stop offset="100%" stop-color="#1D4ED8" /> <!-- Xanh Dương trầm -->
                </linearGradient>

                <!-- Hiệu ứng phát sáng mờ (Glow) đặc trưng -->
                <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="6" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>

            <!-- Nhóm áp dụng bộ lọc sáng chung -->
            <g filter="url(#neonGlow)" 
               fill="none" 
               stroke="url(#neonGradient)" 
               stroke-width="14" 
               stroke-linecap="round" 
               stroke-linejoin="round">
                
                <!-- 1. Đường viền ngoài của thư mục (Outer Boundary) -->
                <!-- Vẽ bắt đầu từ mép trái giữa, đi lên phần tab (nhãn dán), vòng qua phải và xuống dưới -->
                <path d="M 56 100 
                         L 56 80 A 16 16 0 0 1 72 64 
                         L 100 64 L 120 84 L 184 84 
                         A 16 16 0 0 1 200 100 
                         L 200 176 A 16 16 0 0 1 184 192 
                         L 72 192 A 16 16 0 0 1 56 176 
                         Z" />

                <!-- 2. Nếp gấp bên trong (Front Flap Edge) -->
                <!-- Đường kẻ phân tách nắp thư mục phía trước và mặt sau -->
                <path d="M 56 100 L 104 100 L 124 120 L 200 120" />
                
            </g>
        </svg>