<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" class="icon-svg">
            <defs>
                <!-- Dải màu gradient chung bao phủ toàn bộ không gian của icon -->
                <linearGradient id="neonGradient" x1="0" y1="40" x2="0" y2="216" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#38BDF8" /> <!-- Xanh Cyan rực rỡ -->
                    <stop offset="100%" stop-color="#1D4ED8" /> <!-- Xanh Dương trầm -->
                </linearGradient>

                <!-- Hiệu ứng phát sáng mờ (Glow) đặc trưng -->
                <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="6" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>

                <!-- Mặt nạ (Mask) để giấu đi một góc của khung ảnh, nhường chỗ cho Badge -->
                <mask id="badgeMask">
                    <!-- Nền trắng: Giữ lại mọi thứ -->
                    <rect width="256" height="256" fill="#FFFFFF" />
                    <!-- Hình chữ nhật đen: Cắt tạo khoảng trống (gap) xung quanh huy hiệu -->
                    <rect x="132" y="32" width="108" height="104" rx="24" fill="#000000" />
                </mask>
            </defs>

            <!-- Nhóm áp dụng bộ lọc sáng chung -->
            <g filter="url(#neonGlow)">
                
                <!-- 1. KHUNG ẢNH & CẢNH VẬT (Bị cắt bởi Mặt nạ Mask) -->
                <g mask="url(#badgeMask)" fill="none" stroke="url(#neonGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
                    
                    <!-- Khung hình bên ngoài -->
                    <rect x="40" y="64" width="160" height="144" rx="24" />
                    
                    <!-- Mặt trời (Dạng vòng tròn ring) -->
                    <circle cx="80" cy="96" r="12" />
                    
                    <!-- Hai ngọn núi -->
                    <!-- Bắt đầu từ 184 (ngay điểm kết thúc bo tròn góc của khung) để không bị lẹm viền -->
                    <path d="M 40 184 
                             L 92 132 
                             L 128 168 
                             L 164 132 
                             L 200 168" />
                </g>

                <!-- 2. HUY HIỆU ĐỊNH DẠNG (Nằm nổi lên trên ở góc phải) -->
                <!-- Khung huy hiệu (Xóa nền tối theo yêu cầu, chỉ giữ lại đường viền) -->
                <rect x="144" y="44" width="84" height="80" rx="16" 
                      fill="none" 
                      stroke="url(#neonGradient)" 
                      stroke-width="12" 
                      stroke-linejoin="round" />
                      
                <!-- Chữ định dạng bên trong (PNG / JPEG) -->
                <text x="186" y="74" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="20" fill="url(#neonGradient)" style="letter-spacing: 0.5px;">PNG</text>
                <text x="186" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="20" fill="url(#neonGradient)" style="letter-spacing: 0.5px;">JPEG</text>
                
            </g>
        </svg>