<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" class="icon-svg">
            <defs>
                <!-- Dải màu gradient bao phủ toàn bộ vùng không gian vẽ (userSpaceOnUse) -->
                <linearGradient id="neonGradient" x1="0" y1="40" x2="0" y2="220" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#38BDF8" /> <!-- Xanh Cyan sáng -->
                    <stop offset="100%" stop-color="#1D4ED8" /> <!-- Xanh dương đậm -->
                </linearGradient>

                <!-- Hiệu ứng phát sáng (Neon Glow) -->
                <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="6" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>

                <!-- Mặt nạ (Mask) dùng để cắt một góc của màn hình, chừa chỗ cho khối Checkmark -->
                <mask id="cutoutMask">
                    <rect x="0" y="0" width="256" height="256" fill="#FFFFFF" />
                    <!-- Hình tròn đen sẽ tạo ra khoảng trống trong suốt -->
                    <circle cx="188" cy="164" r="46" fill="#000000" />
                </mask>
            </defs>

            <!-- Nhóm áp dụng hiệu ứng phát sáng và màu gradient chung -->
            <g filter="url(#neonGlow)">
                
                <!-- Nhóm các đường nét (Màn hình, Nút nguồn, Chân đế) -->
                <g fill="none" stroke="url(#neonGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
                    
                    <!-- 1. Màn hình (Bị cắt góc dưới phải bằng Mask) -->
                    <rect x="40" y="56" width="176" height="128" rx="24" mask="url(#cutoutMask)" />
                    
                    <!-- 2. Chân đế màn hình -->
                    <path d="M 128 184 L 128 214" />
                    <path d="M 100 214 L 156 214" />
                    
                    <!-- 3. Biểu tượng Nút Nguồn (Power) bên trong -->
                    <path d="M 128 84 L 128 120" />
                    <path d="M 106 106 A 30 30 0 1 0 150 106" />
                </g>

                <!-- 4. Huy hiệu nền cho dấu tick (Nằm đè lên vùng bị cắt) -->
                <circle cx="188" cy="164" r="32" fill="url(#neonGradient)" />
            </g>

            <!-- 5. Dấu tick (Checkmark) bên trong huy hiệu -->
            <!-- Được vẽ tách ra ngoài nhóm Glow để đường viền giữ được độ sắc nét -->
            <!-- Màu sắc trùng với màu nền để tạo cảm giác "khoét xuyên" -->
            <path d="M 172 164 L 184 176 L 206 150" 
                  fill="none" 
                  stroke="#090A10" 
                  stroke-width="10" 
                  stroke-linecap="round" 
                  stroke-linejoin="round" />

        </svg>