<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" class="icon-svg">
            <defs>
                <!-- Dải màu gradient chung bao phủ không gian của icon -->
                <linearGradient id="neonGradient" x1="0" y1="40" x2="0" y2="216" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#38BDF8" /> <!-- Xanh Cyan rực rỡ -->
                    <stop offset="100%" stop-color="#1D4ED8" /> <!-- Xanh Dương trầm -->
                </linearGradient>

                <!-- Hiệu ứng phát sáng mờ (Glow) đặc trưng -->
                <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="6" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>

            <!-- Nhóm áp dụng bộ lọc sáng và đường viền chung -->
            <g filter="url(#neonGlow)" 
               fill="none" 
               stroke="url(#neonGradient)" 
               stroke-width="14" 
               stroke-linecap="round" 
               stroke-linejoin="round">
                
                <!-- 1. Thân Loa (Speaker Body) -->
                <!-- Vẽ bắt đầu từ cạnh dưới, vòng sang trái lên trên rồi loe ra thành tam giác -->
                <path d="M 82 152
                         L 66 152 A 12 12 0 0 1 54 140
                         L 54 116 A 12 12 0 0 1 66 104
                         L 82 104
                         L 116 64 A 8 8 0 0 1 130 70
                         L 130 186 A 8 8 0 0 1 116 192
                         Z" />
                         
                <!-- 2. Sóng âm nhỏ (Inner Wave) -->
                <path d="M 154 104 A 40 40 0 0 1 154 152" />
                
                <!-- 3. Sóng âm vừa (Middle Wave) -->
                <path d="M 178 84 A 70 70 0 0 1 178 172" />
                
                <!-- 4. Sóng âm lớn (Outer Wave) -->
                <path d="M 202 64 A 100 100 0 0 1 202 192" />
                
            </g>
        </svg>