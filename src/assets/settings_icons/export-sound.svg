<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" class="icon-svg">
            <defs>
                <!-- Dải màu gradient chung bao phủ toàn bộ không gian của icon -->
                <linearGradient id="neonGradient" x1="0" y1="40" x2="0" y2="216" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#38BDF8" /> <!-- Xanh Cyan rực rỡ -->
                    <stop offset="100%" stop-color="#1D4ED8" /> <!-- Xanh Dương trầm -->
                </linearGradient>

                <!-- Hiệu ứng phát sáng mờ (Glow) đặc trưng -->
                <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="6" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>

                <!-- Mặt nạ (Mask) để giấu đi phần đĩa mềm nằm phía sau chiếc loa -->
                <mask id="speakerMask">
                    <!-- Nền trắng: Hiển thị mọi thứ -->
                    <rect width="256" height="256" fill="#FFFFFF" />
                    <!-- Nhóm loa được vẽ bằng màu đen và viền dày để tạo khoảng hở (gap) -->
                    <g fill="#000000" stroke="#000000" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
                        <!-- Thân loa -->
                        <path d="M 140 156 L 132 156 A 6 6 0 0 0 126 162 L 126 182 A 6 6 0 0 0 132 188 L 140 188 L 162 206 A 6 6 0 0 0 172 201 L 172 143 A 6 6 0 0 0 162 138 Z" />
                        <!-- Sóng âm -->
                        <path d="M 188 156 A 16 16 0 0 1 188 188" />
                        <path d="M 204 140 A 32 32 0 0 1 204 204" />
                    </g>
                </mask>
            </defs>

            <!-- Nhóm áp dụng bộ lọc sáng chung -->
            <g filter="url(#neonGlow)">
                
                <!-- 1. Nhóm ĐĨA MỀM (Bị cắt bởi Mặt nạ Mask) -->
                <g mask="url(#speakerMask)" fill="none" stroke="url(#neonGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
                    
                    <!-- Đường viền ngoài của đĩa mềm (Có vát góc trên cùng bên phải) -->
                    <path d="M 72 44 L 152 44 L 200 92 L 200 196 A 16 16 0 0 1 184 212 L 72 212 A 16 16 0 0 1 56 196 L 56 60 A 16 16 0 0 1 72 44 Z" />
                    
                    <!-- Khe trượt phía trên -->
                    <path d="M 92 44 L 92 84 A 8 8 0 0 0 100 92 L 132 92 A 8 8 0 0 0 140 84 L 140 44" />
                    <!-- Hình chữ nhật nhỏ bên trong khe trượt (vẽ bằng rect đặc) -->
                    <rect x="116" y="56" width="12" height="16" rx="4" fill="url(#neonGradient)" stroke="none" />

                    <!-- Nhãn dán phía dưới -->
                    <path d="M 84 212 L 84 140 A 12 12 0 0 1 96 128 L 160 128 A 12 12 0 0 1 172 140 L 172 212" />
                    
                    <!-- Hai dải dòng kẻ trên nhãn dán -->
                    <path d="M 104 160 L 132 160" />
                    <path d="M 104 184 L 152 184" />
                </g>

                <!-- 2. Nhóm LOA VÀ SÓNG ÂM (Nằm nổi lên trên) -->
                <g stroke-linecap="round" stroke-linejoin="round">
                    <!-- Thân loa (Khối đặc, không có viền) -->
                    <path d="M 140 156 L 132 156 A 6 6 0 0 0 126 162 L 126 182 A 6 6 0 0 0 132 188 L 140 188 L 162 206 A 6 6 0 0 0 172 201 L 172 143 A 6 6 0 0 0 162 138 Z" 
                          fill="url(#neonGradient)" />
                          
                    <!-- Sóng âm lan tỏa -->
                    <g fill="none" stroke="url(#neonGradient)" stroke-width="10">
                        <path d="M 188 156 A 16 16 0 0 1 188 188" />
                        <path d="M 204 140 A 32 32 0 0 1 204 204" />
                    </g>
                </g>
                
            </g>
        </svg>