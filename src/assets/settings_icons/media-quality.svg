<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" class="icon-svg">
            <defs>
                <!-- Dải màu gradient chung bao phủ toàn bộ không gian của icon -->
                <linearGradient id="neonGradient" x1="0" y1="40" x2="0" y2="216" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#38BDF8" /> <!-- Xanh Cyan rực rỡ -->
                    <stop offset="100%" stop-color="#1D4ED8" /> <!-- Xanh Dương trầm -->
                </linearGradient>

                <!-- Hiệu ứng phát sáng mờ (Glow) đặc trưng -->
                <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="6" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>

                <!-- Mặt nạ (Mask) để cắt khoảng hở xung quanh huy hiệu "100%" -->
                <mask id="progressMask">
                    <!-- Nền trắng: Giữ lại mọi thứ -->
                    <rect width="256" height="256" fill="#FFFFFF" />
                    <!-- Hình tròn đen: Cắt xuyên qua khung ảnh để nhường chỗ cho Badge -->
                    <circle cx="180" cy="180" r="54" fill="#000000" />
                </mask>
            </defs>

            <!-- Nhóm áp dụng bộ lọc sáng chung -->
            <g filter="url(#neonGlow)">
                
                <!-- 1. KHUNG ẢNH KÉP & PHONG CẢNH (Bị cắt bởi Mặt nạ) -->
                <g mask="url(#progressMask)" fill="none" stroke="url(#neonGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
                    
                    <!-- Khung viền ngoài cùng -->
                    <rect x="40" y="40" width="176" height="176" rx="32" />
                    
                    <!-- Khung hình ảnh nhỏ bên trong -->
                    <rect x="76" y="76" width="104" height="104" rx="16" />
                    
                    <!-- Mặt trời (Khối tròn đặc) -->
                    <circle cx="106" cy="106" r="10" fill="url(#neonGradient)" stroke="none" />
                    
                    <!-- Ngọn núi (Đường nối liền 2 cạnh của khung trong) -->
                    <path d="M 76 164 
                             L 104 136 
                             L 128 160 
                             L 154 132 
                             L 180 158" />
                </g>

                <!-- 2. HUY HIỆU TIẾN TRÌNH 100% (Nằm đè lên trên) -->
                <g fill="none" stroke="url(#neonGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
                    
                    <!-- Phần viền nét liền (Chiếm 3/4 hình tròn từ vị trí 3 giờ đến 12 giờ ngược chiều kim đồng hồ) -->
                    <!-- Lệnh Arc (A): 180,140 là đỉnh trên; 220,180 là đỉnh bên phải -->
                    <path d="M 180 140 A 40 40 0 1 0 220 180" />
                    
                    <!-- Phần viền nét đứt (Chiếm 1/4 hình tròn từ vị trí 12 giờ đến 3 giờ theo chiều kim đồng hồ) -->
                    <!-- Thiết lập dasharray="1 19.9" kết hợp với stroke-linecap="round" để tạo chính xác 3 vạch -->
                    <path d="M 180 140 A 40 40 0 0 1 220 180" stroke-dasharray="1 19.9" />
                    
                </g>

                <!-- Chữ "100%" ở trung tâm huy hiệu -->
                <text x="180" y="186" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="22" fill="url(#neonGradient)" style="letter-spacing: 0.5px;">100%</text>
                
            </g>
        </svg>